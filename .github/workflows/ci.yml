name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: PHP 8.2 — Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, curl, openssl, ldap, gd, iconv
          coverage: none

      - name: Validate composer.json
        run: composer validate

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup CI config
        run: cp private/config.ini.ci private/config.ini

      - name: Run PHPUnit
        run: php vendor/phpunit/phpunit/phpunit --no-progress
